<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chirply</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css?v=20" />
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three/three.module.js",
        "three/addons/": "./vendor/three/addons/"
      }
    }
  </script>
</head>
<body>
  <div class="world" id="world" aria-hidden="true">
    <div class="landscape-wrap">
      <img class="landscape" src="./assets/landscape.png" alt="" />
    </div>

    <div class="sky-anim">
      <div class="cloud cloud-a"></div>
      <div class="cloud cloud-b"></div>
      <div class="cloud cloud-c"></div>
      <div class="mist mist-a"></div>
      <div class="mist mist-b"></div>
    </div>

    <div class="foliage-sway"></div>
    <div class="world-veil"></div>
  </div>

  <canvas id="flock" class="flock" aria-hidden="true"></canvas>

  <main class="splash" id="splash">
    <h1 class="brand">Chirply</h1>
    <p class="tagline">Hear a bird. Know its name.</p>
    <button type="button" class="start-btn" id="startBtn">Start</button>
  </main>

  <main class="app-screen" id="appScreen" hidden>
    <button type="button" class="back-btn back-float" id="backBtn">Back</button>

    <div class="workspace" id="workspace">
      <section class="grid-panel" id="gridPanel" hidden>
        <div class="cad-mount" id="cadMount" aria-label="Sound frequency grid"></div>
        <p class="listen-status" id="listenStatus">Listening…</p>
      </section>

      <aside class="result-panel" id="resultPanel" hidden>
        <div class="result-media">
          <img id="resultImage" class="result-image" alt="" hidden />
          <div class="result-image-fallback" id="resultImageFallback" aria-hidden="true">Bird</div>
        </div>
        <h2 class="result-name" id="resultName">—</h2>
        <p class="result-sci" id="resultSci">—</p>
        <dl class="result-meta">
          <div>
            <dt>Confidence</dt>
            <dd id="resultConfidence">—</dd>
          </div>
          <div>
            <dt>Location</dt>
            <dd id="resultLocation">—</dd>
          </div>
          <div>
            <dt>Heard</dt>
            <dd id="resultHeard">—</dd>
          </div>
        </dl>
        <p class="result-note" id="resultNote"></p>
      </aside>
    </div>

    <nav class="tool-bar" aria-label="Identify tools">
      <button type="button" class="tool-btn" id="fileBtn" disabled title="Upload a recording">
        <span class="tool-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z" />
            <path d="M14 3v5h5" />
          </svg>
        </span>
        <span class="tool-label">File</span>
      </button>

      <button type="button" class="tool-btn tool-btn-primary" id="micBtn" title="Listen with microphone">
        <span class="tool-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="11" rx="3" />
            <path d="M5 11a7 7 0 0 0 14 0" />
            <path d="M12 18v3" />
            <path d="M9 21h6" />
          </svg>
        </span>
        <span class="tool-label">Mic</span>
      </button>

      <button type="button" class="tool-btn" id="resultBtn" disabled title="View identification">
        <span class="tool-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 7c0-2-1.5-4-4-4S8 5 8 7c0 1.2.5 2.2 1.2 3L4 16l3 1 2.5-2.5L12 18l2-1-1.5-3.5L16 11c.6-.8 1-1.8 1-3z" />
            <circle cx="14.2" cy="6.2" r="0.7" fill="currentColor" stroke="none" />
          </svg>
        </span>
        <span class="tool-label">Result</span>
      </button>
    </nav>

    <input type="file" id="fileInput" accept="audio/*,.wav,.mp3,.m4a,.ogg" hidden />
  </main>

  <script src="./ambient.js?v=20"></script>
  <script src="./birdsVideo.js?v=20"></script>
  <script src="./app.js?v=20"></script>
  <script type="module" src="./cadGrid.js?v=20"></script>
</body>
</html>
